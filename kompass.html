<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Kompass</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; touch-action: manipulation; }
  body { background: #1c1813; color: #e8e0d4; font-family: -apple-system, sans-serif; overflow: hidden; height: 100dvh; }

.app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; position: relative; }

.header { padding: 56px 20px 14px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 11px; letter-spacing: 3px; color: #c8a96e; text-transform: uppercase; }

.inhalt { flex: 1; overflow-y: auto; padding: 10px 20px 140px; -webkit-overflow-scrolling: touch; }
.inhalt::-webkit-scrollbar { display: none; }

.seite { display: none; }
.seite.aktiv { display: block; }

.card { background: #252018; border: 1px solid #38332c; border-radius: 18px; padding: 20px; margin-bottom: 15px; }

.btn-gold { background: #c8a96e; color: #1c1813; border: none; border-radius: 14px; padding: 18px; width: 100%; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 12px; font-family: inherit; }
.btn-gold:active { opacity: 0.8; }
.btn-gold.grey { background: #2e2b24; color: #7a7570; }

.win-row { display: flex; gap: 8px; margin-bottom: 15px; }
.win-row input { flex: 1; background: #252018; border: 1px solid #38332c; border-radius: 10px; padding: 12px; color: #e8e0d4; font-size: 16px; outline: none; -webkit-appearance: none; }
.win-row button { background: #2e2b24; border: 1px solid #38332c; border-radius: 10px; padding: 0 16px; color: #c8a96e; font-size: 20px; }

.win-item { padding: 10px 0; border-bottom: 1px solid #38332c; color: #b0a898; font-size: 14px; }

.dock-wrap { position: fixed; bottom: env(safe-area-inset-bottom, 20px); left: 0; width: 100%; display: flex; justify-content: center; padding: 0 20px; z-index: 1000; pointer-events: none; }
.dock { background: #1a1610; border: 1px solid #38332c; border-radius: 30px; padding: 8px; display: flex; gap: 4px; pointer-events: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }

.nt { width: 72px; height: 52px; border-radius: 22px; border: none; background: transparent; color: #7a7570; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
.nt.aktiv { background: #c8a96e; color: #1c1813; }
.nt span { font-size: 20px; }
.nt-txt { font-size: 9px; font-weight: 700; text-transform: uppercase; margin-top: 2px; }

.scale-row { display: flex; gap: 7px; margin-bottom: 8px; }
.scale-row button { flex: 1; height: 50px; background: #2e2b24; border: 1px solid #38332c; border-radius: 10px; color: #7a7570; font-size: 16px; font-weight: 700; }
.scale-row button.on { background: #c8a96e; color: #1c1813; border-color: #c8a96e; }

.prog-bar { display: flex; gap: 5px; margin-bottom: 20px; }
.prog-step { flex: 1; height: 3px; border-radius: 2px; background: #38332c; }
.prog-step.done { background: #c8a96e; }
</style>

</head>
<body>

  <div class="header">

  </div>

  <div class="inhalt">
    <section class="seite aktiv" id="seite-home">
      <h1 id="greeting" style="font-size:28px; font-weight:400; margin-bottom:20px;"></h1>
      <div class="card">
        <div style="font-size:11px; color:#7a7570; letter-spacing:1px; margin-bottom:5px;">STREAK</div>
        <div id="streak-num" style="font-size:32px; color:#c8a96e;">0 Tage</div>
      </div>
      <button class="btn-gold" id="btn-start" onclick="goCI()">Check-in starten →</button>

  <div class="win-row">
    <input type="text" id="win-in" placeholder="Was lief heute gut?">

  </div>

  <div class="dock-wrap">
    <nav class="dock">
      <button class="nt aktiv" id="n-home" onclick="nav('home')"><span>⌂</span><div class="nt-txt">Start</div></button>
      <button class="nt" id="n-ci" onclick="nav('ci')"><span>◎</span><div class="nt-txt">Check-in</div></button>
      <button class="nt" id="n-hist" onclick="nav('hist')"><span>◫</span><div class="nt-txt">Verlauf</div></button>
    </nav>
  </div>
</div>

<script>
var QS=[
  {id:'sicht', text:'Habe ich heute klar Position bezogen?'},
  {id:'kritik', text:'Wie fair war mein innerer Kritiker heute?'},
  {id:'pause', text:'Habe ich mir heute eine bewusste Pause gegönnt?'},
  {id:'energie', text:'Wie ist mein aktuelles Energielevel?'}
];

var entries=[], wins=[], streak=0, lastCI='', curQ=0, ans={};

function load(){
  try {
    entries = JSON.parse(localStorage.getItem('k_entries') || '[]');
    wins = JSON.parse(localStorage.getItem('k_wins') || '[]');
    streak = parseInt(localStorage.getItem('k_streak') || '0');
    lastCI = localStorage.getItem('k_last') || '';
  } catch(e) { console.error("Datenfehler", e); }
}

function save(){
  localStorage.setItem('k_entries', JSON.stringify(entries));
  localStorage.setItem('k_wins', JSON.stringify(wins));
  localStorage.setItem('k_streak', streak.toString());
  localStorage.setItem('k_last', lastCI);
}

function nav(id){
  document.querySelectorAll('.seite').forEach(function(s){ s.classList.remove('aktiv'); });
  document.querySelectorAll('.nt').forEach(function(n){ n.classList.remove('aktiv'); });
  
  var target = document.getElementById('seite-' + id);
  if(target) target.classList.add('aktiv');
  
  var btn = document.getElementById('n-' + id);
  if(btn) btn.classList.add('aktiv');

  if(id === 'home') renderHome();
  if(id === 'hist') renderHist();
}

function renderHome(){
  var h = new Date().getHours();
  var g = h < 12 ? 'Guten Morgen' : h < 18 ? 'Guten Tag' : 'Guten Abend';
  document.getElementById('greeting').innerText = g + ', Thomas.';
  document.getElementById('streak-num').innerText = streak + (streak === 1 ? " Tag" : " Tage");
  document.getElementById('streak-badge').innerText = "🔥 " + streak + " Tage";
  
  var today = new Date().toDateString();
  var wl = document.getElementById('win-list');
  wl.innerHTML = '';
  wins.filter(function(w){ return w.date === today; }).forEach(function(w){
    var div = document.createElement('div');
    div.className = 'win-item';
    div.innerText = '◆ ' + w.text;
    wl.appendChild(div);
  });

  var b = document.getElementById('btn-start');
  if(lastCI === today) {
    b.innerText = "Check-in abgeschlossen ✓";
    b.classList.add('grey');
    b.onclick = null;
  } else {
    b.innerText = "Check-in starten →";
    b.classList.remove('grey');
    b.onclick = goCI;
  }
}

function addWin(){
  var inp = document.getElementById('win-in');
  var val = inp.value.trim();
  if(!val) return;
  wins.push({text: val, date: new Date().toDateString()});
  inp.value = '';
  save();
  renderHome();
}

function goCI(){
  curQ = 0;
  ans = {};
  renderQ();
  nav('ci');
}

function renderQ(){
  var q = QS[curQ];
  document.getElementById('q-text').innerText = q.text;
  
  var pb = '';
  for(var i=0; i<QS.length; i++){
    pb += '<div class="prog-step' + (i <= curQ ? ' done' : '') + '"></div>';
  }
  document.getElementById('prog-bar').innerHTML = pb;

  var html = '<div class="scale-row">';
  for(var n=1; n<=5; n++){
    var isSel = ans[q.id] == n ? ' on' : '';
    html += '<button onclick="selectScore(\'' + q.id + '\',' + n + ')" class="' + isSel.trim() + '">' + n + '</button>';
  }
  html += '</div>';
  document.getElementById('q-in').innerHTML = html;
  
  document.getElementById('btn-next').innerText = (curQ === QS.length - 1) ? "Abschließen" : "Weiter";
}

function selectScore(qid, val){
  ans[qid] = val;
  renderQ();
}

function nextQ(){
  if(!ans[QS[curQ].id]) return;
  if(curQ < QS.length - 1){
    curQ++;
    renderQ();
  } else {
    finishCheckin();
  }
}

function finishCheckin(){
  var today = new Date().toDateString();
  var yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  
  if(lastCI === yesterday.toDateString()){
    streak++;
  } else if(lastCI !== today){
    streak = 1;
  }
  
  lastCI = today;
  entries.unshift({date: today, ts: Date.now(), data: ans});
  save();
  nav('home');
}

function renderHist(){
  var hl = document.getElementById('hist-list');
  hl.innerHTML = entries.length ? '' : '<div style="color:#7a7570">Noch keine Einträge vorhanden.</div>';
  entries.forEach(function(e){
    var d = new Date(e.ts).toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit', year:'numeric'});
    hl.innerHTML += '<div class="card" style="font-size:14px;"><strong>' + d + '</strong><br>Check-in erfolgreich durchgeführt.</div>';
  });
}

load();
renderHome();
</script>

</body>
</html>
