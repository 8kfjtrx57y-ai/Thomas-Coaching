<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Kompass</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html { background: #1c1813 !important; min-height: 100%; overscroll-behavior: none; }

body {
background: #1c1813 !important;
color: #e8e0d4 !important;
font-family: ‘DM Sans’, -apple-system, BlinkMacSystemFont, ‘Helvetica Neue’, Arial, sans-serif;
min-height: 100vh;
font-size: 15px;
line-height: 1.6;
-webkit-text-size-adjust: 100%;
overflow-x: hidden;
}

.screen { display: none !important; }
.screen.active { display: block !important; min-height: 100vh; background: #1c1813; padding-bottom: 90px; }

.home-wrap { max-width: 480px; margin: 0 auto; padding: 52px 22px 20px; }

.logo-label {
font-family: ‘DM Sans’, sans-serif;
font-size: 11px;
letter-spacing: 4px;
text-transform: uppercase;
color: #c8a96e;
margin-bottom: 8px;
}

.greeting {
font-family: ‘Playfair Display’, Georgia, serif;
font-size: 30px;
font-weight: 400;
color: #e8e0d4;
line-height: 1.25;
margin-bottom: 4px;
}

.date-label { font-size: 13px; color: #7a7570; margin-bottom: 32px; }

.streak-box {
background: #252018;
border: 1px solid #38332c;
border-radius: 14px;
padding: 16px 18px;
display: flex;
align-items: center;
gap: 14px;
margin-bottom: 20px;
}
.streak-num { font-family: ‘Playfair Display’, Georgia, serif; font-size: 24px; color: #c8a96e; }
.streak-lbl { font-size: 12px; color: #7a7570; margin-top: 1px; }
.streak-dots { display: flex; gap: 5px; margin-left: auto; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #38332c; }
.dot.on { background: #c8a96e; }

.done-banner {
background: #192820;
border: 1px solid #7eb8a4;
border-radius: 14px;
padding: 18px;
text-align: center;
margin-bottom: 20px;
display: none;
}
.done-banner.show { display: block; }
.done-banner-text { font-family: ‘Playfair Display’, Georgia, serif; font-size: 15px; color: #7eb8a4; }
.done-banner-sub { font-size: 12px; color: #7a7570; margin-top: 3px; }

.btn-primary {
display: block;
width: 100%;
background: #c8a96e !important;
color: #1c1813 !important;
border: none;
border-radius: 14px;
padding: 17px 22px;
font-family: ‘DM Sans’, sans-serif;
font-size: 15px;
font-weight: 600;
cursor: pointer;
text-align: center;
margin-bottom: 14px;
-webkit-appearance: none;
appearance: none;
}
.btn-primary.done-state { background: #2e2b24 !important; color: #7a7570 !important; }

.sec-label {
font-size: 10px;
letter-spacing: 3px;
text-transform: uppercase;
color: #7a7570;
margin-bottom: 12px;
margin-top: 24px;
}

.win-row { display: flex; gap: 8px; margin-bottom: 8px; }
.win-input {
flex: 1;
background: #252018;
border: 1px solid #38332c;
border-radius: 10px;
padding: 12px 14px;
color: #e8e0d4;
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
outline: none;
-webkit-appearance: none;
}
.win-input::placeholder { color: #7a7570; }
.win-input:focus { border-color: #c8a96e; }
.win-btn {
background: #2e2b24;
border: 1px solid #38332c;
border-radius: 10px;
padding: 12px 16px;
color: #c8a96e;
font-size: 20px;
cursor: pointer;
-webkit-appearance: none;
}
.win-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid #38332c; font-size: 14px; color: #b0a898; }
.win-item:last-child { border-bottom: none; }
.win-dot { color: #c8a96e; flex-shrink: 0; }

.bottom-nav {
position: fixed;
bottom: 0; left: 0; right: 0;
background: #252018;
border-top: 1px solid #38332c;
display: flex;
padding: 10px 0 20px;
z-index: 999;
}
.nav-item {
flex: 1;
background: none;
border: none;
color: #7a7570;
font-family: ‘DM Sans’, sans-serif;
font-size: 11px;
cursor: pointer;
display: flex;
flex-direction: column;
align-items: center;
gap: 3px;
padding: 4px 0;
-webkit-appearance: none;
}
.nav-item.active { color: #c8a96e; }
.nav-icon { font-size: 20px; line-height: 1; }

.checkin-wrap { max-width: 480px; margin: 0 auto; padding: 24px 22px 120px; }
.progress-bar { display: flex; gap: 5px; margin-bottom: 28px; }
.prog-step { flex: 1; height: 3px; background: #38332c; border-radius: 2px; }
.prog-step.done { background: #c8a96e; }
.prog-step.current { background: #c8a96e; opacity: 0.5; }

.q-theme { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; font-weight: 500; }
.q-count { font-size: 12px; color: #7a7570; margin-bottom: 24px; }

.q-card { background: #252018; border: 1px solid #38332c; border-radius: 14px; padding: 22px; margin-bottom: 18px; }
.q-text { font-family: ‘Playfair Display’, Georgia, serif; font-size: 18px; font-weight: 400; color: #e8e0d4; line-height: 1.5; margin-bottom: 20px; }

.scale-row { display: flex; gap: 7px; margin-bottom: 8px; }
.scale-btn {
flex: 1;
aspect-ratio: 1;
min-height: 48px;
background: #2e2b24;
border: 1px solid #38332c;
border-radius: 10px;
color: #7a7570;
font-size: 14px;
font-weight: 500;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
-webkit-appearance: none;
}
.scale-btn.sel { background: #c8a96e !important; color: #1c1813 !important; border-color: #c8a96e !important; }
.scale-labels { display: flex; justify-content: space-between; font-size: 11px; color: #7a7570; }

.q-textarea {
width: 100%;
background: #2e2b24;
border: 1px solid #38332c;
border-radius: 10px;
padding: 13px;
color: #e8e0d4;
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
resize: none;
outline: none;
min-height: 90px;
line-height: 1.6;
-webkit-appearance: none;
}
.q-textarea::placeholder { color: #7a7570; }
.q-textarea:focus { border-color: #c8a96e; }
.optional-hint { font-size: 11px; color: #7a7570; margin-top: 6px; }

.yesno-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.yesno-btn {
padding: 14px;
background: #2e2b24;
border: 1px solid #38332c;
border-radius: 10px;
color: #b0a898;
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
cursor: pointer;
text-align: center;
-webkit-appearance: none;
}
.yesno-btn.sel-yes { background: #192820 !important; border-color: #7eb8a4 !important; color: #7eb8a4 !important; }
.yesno-btn.sel-no { background: #281818 !important; border-color: #c87e7e !important; color: #c87e7e !important; }

.nav-btns { display: flex; gap: 10px; margin-top: 10px; }
.btn-back { background: #252018; border: 1px solid #38332c; border-radius: 10px; padding: 14px 18px; color: #7a7570; font-family: ‘DM Sans’, sans-serif; font-size: 14px; cursor: pointer; -webkit-appearance: none; }
.btn-next { flex: 1; background: #c8a96e !important; color: #1c1813 !important; border: none; border-radius: 10px; padding: 14px 18px; font-family: ‘DM Sans’, sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; -webkit-appearance: none; }

.done-wrap { max-width: 480px; margin: 0 auto; padding: 60px 22px 120px; text-align: center; }
.done-emoji { font-size: 56px; margin-bottom: 20px; }
.done-title { font-family: ‘Playfair Display’, Georgia, serif; font-size: 26px; color: #e8e0d4; margin-bottom: 10px; }
.done-msg { font-size: 14px; color: #7a7570; line-height: 1.7; max-width: 300px; margin: 0 auto 28px; }

.score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.score-card { background: #252018; border: 1px solid #38332c; border-radius: 12px; padding: 14px; text-align: left; }
.score-lbl { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #7a7570; margin-bottom: 5px; }
.score-val { font-family: ‘Playfair Display’, Georgia, serif; font-size: 20px; color: #e8e0d4; }
.score-val.good { color: #7eb8a4; }
.score-val.mid { color: #c8a96e; }
.score-val.low { color: #c87e7e; }

.history-wrap { max-width: 480px; margin: 0 auto; padding: 52px 22px 20px; }
.history-title { font-family: ‘Playfair Display’, Georgia, serif; font-size: 24px; color: #e8e0d4; margin-bottom: 4px; }
.history-sub { font-size: 13px; color: #7a7570; margin-bottom: 24px; }

.trend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.trend-lbl { font-size: 12px; color: #b0a898; width: 90px; flex-shrink: 0; }
.trend-track { flex: 1; height: 6px; background: #2e2b24; border-radius: 3px; overflow: hidden; }
.trend-fill { height: 100%; border-radius: 3px; }
.trend-val { font-size: 12px; color: #7a7570; width: 28px; text-align: right; }

.history-entry { background: #252018; border: 1px solid #38332c; border-radius: 14px; padding: 16px; margin-bottom: 10px; cursor: pointer; }
.h-date { font-size: 12px; color: #7a7570; margin-bottom: 8px; }
.h-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #2e2b24; color: #b0a898; }
.pill.hi { background: #192820; color: #7eb8a4; }
.pill.mid { background: #2a2618; color: #c8a96e; }
.pill.lo { background: #281818; color: #c87e7e; }
.empty-msg { text-align: center; color: #7a7570; font-size: 14px; padding: 40px 0; }

.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 9999; display: none; align-items: flex-end; justify-content: center; }
.modal-bg.open { display: flex; }
.modal-box { background: #252018; border-radius: 20px 20px 0 0; border: 1px solid #38332c; border-bottom: none; padding: 20px 22px 40px; width: 100%; max-width: 480px; max-height: 80vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: #38332c; border-radius: 2px; margin: 0 auto 18px; }
.modal-date { font-size: 12px; color: #7a7570; margin-bottom: 14px; }
.modal-row { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #38332c; }
.modal-row:last-child { border-bottom: none; }
.modal-qlbl { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #7a7570; margin-bottom: 4px; }
.modal-qtxt { font-size: 12px; color: #5a5550; margin-bottom: 4px; }
.modal-val { font-size: 14px; color: #b0a898; }
.modal-close { width: 100%; background: #2e2b24; border: 1px solid #38332c; border-radius: 10px; padding: 13px; color: #7a7570; font-family: ‘DM Sans’, sans-serif; font-size: 14px; cursor: pointer; margin-top: 14px; -webkit-appearance: none; }
</style>

</head>
<body>

<div class="screen active" id="screen-home">
  <div class="home-wrap">
    <div class="logo-label">◈ Kompass</div>
    <div class="greeting" id="el-greeting">Guten Abend, Thomas.</div>
    <div class="date-label" id="el-date"></div>
    <div class="streak-box">
      <div style="font-size:26px">🔥</div>
      <div><div class="streak-num" id="el-streak">0</div><div class="streak-lbl">Tage in Folge</div></div>
      <div class="streak-dots" id="el-dots"></div>
    </div>
    <div class="done-banner" id="el-banner">
      <div style="font-size:26px;margin-bottom:6px">✓</div>
      <div class="done-banner-text">Check-in heute abgeschlossen</div>
      <div class="done-banner-sub">Morgen wieder – du baust etwas auf.</div>
    </div>
    <button class="btn-primary" id="el-startbtn" onclick="startCheckin()">Täglicher Check-in starten →</button>
    <div class="sec-label">Meine Erfolge heute</div>
    <div class="win-row">
      <input class="win-input" id="el-wininput" placeholder="Was habe ich heute gut gemacht?" maxlength="120" />
      <button class="win-btn" onclick="addWin()">+</button>
    </div>
    <div id="el-winlist"></div>
  </div>
</div>

<div class="screen" id="screen-checkin">
  <div class="checkin-wrap">
    <div class="progress-bar" id="el-progress"></div>
    <div class="q-theme" id="el-qtheme"></div>
    <div class="q-count" id="el-qcount"></div>
    <div id="el-qarea"></div>
    <div class="nav-btns">
      <button class="btn-back" id="el-back" onclick="prevQ()">←</button>
      <button class="btn-next" id="el-next" onclick="nextQ()">Weiter</button>
    </div>
  </div>
</div>

<div class="screen" id="screen-done">
  <div class="done-wrap">
    <div class="done-emoji">🧭</div>
    <div class="done-title">Gut gemacht, Thomas.</div>
    <div class="done-msg" id="el-donemsg"></div>
    <div class="score-grid" id="el-scoregrid"></div>
    <button class="btn-primary" onclick="goHome()" style="max-width:300px;margin:0 auto">Zurück zum Start</button>
  </div>
</div>

<div class="screen" id="screen-history">
  <div class="history-wrap">
    <div class="history-title">Verlauf</div>
    <div class="history-sub">Deine letzten Check-ins</div>
    <div class="sec-label">Trends</div>
    <div id="el-trends" style="margin-bottom:24px"></div>
    <div class="sec-label">Einträge</div>
    <div id="el-histlist"></div>
  </div>
</div>

<div class="modal-bg" id="el-modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div id="el-modalcontent"></div>
    <button class="modal-close" onclick="closeModal()">Schließen</button>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-item active" id="nav-home" onclick="showHome()">
    <span class="nav-icon">⌂</span><span>Start</span>
  </button>
  <button class="nav-item" id="nav-checkin" onclick="startCheckin()">
    <span class="nav-icon">◎</span><span>Check-in</span>
  </button>
  <button class="nav-item" id="nav-history" onclick="showHistory()">
    <span class="nav-icon">◫</span><span>Verlauf</span>
  </button>
</nav>

<script>
const QS = [
  {id:'sichtbarkeit', theme:'Sichtbarkeit & Positionierung', color:'#c8a96e', text:'Habe ich heute meine Meinung klar geäußert oder eine Position eingenommen?', type:'scale', labels:['Gar nicht','Stark']},
  {id:'sichtbarkeit_text', theme:'Sichtbarkeit & Positionierung', color:'#c8a96e', text:'Was wäre eine Situation gewesen, in der du dich mehr zeigen konntest?', type:'text', placeholder:'Kurzer Gedanke genügt...', optional:true},
  {id:'selbstwert', theme:'Selbstwert & innerer Kritiker', color:'#a07ec8', text:'Wie fair war mein innerer Kritiker heute zu mir?', type:'scale', labels:['Sehr hart','Fair']},
  {id:'selbstwert_moment', theme:'Selbstwert & innerer Kritiker', color:'#a07ec8', text:'Habe ich mir heute etwas gegönnt – Pause, Lob, Nachsicht?', type:'yesno'},
  {id:'struktur', theme:'Struktur & Eigenantrieb', color:'#7eb8a4', text:'Wie gut habe ich heute ohne externen Druck selbst angetrieben?', type:'scale', labels:['Sofa-Tag','Eigenständig']},
  {id:'struktur_text', theme:'Struktur & Eigenantrieb', color:'#7eb8a4', text:'Was hat mir heute geholfen, in Bewegung zu bleiben – oder was hat gefehlt?', type:'text', placeholder:'Routine, Musik, Verabredung...', optional:true},
  {id:'fehler', theme:'Umgang mit Rückschlägen', color:'#c87e7e', text:'Ist mir heute etwas schiefgelaufen? Wie bin ich damit umgegangen?', type:'text', placeholder:'Was ist passiert, und was hast du daraus gemacht?', optional:true},
  {id:'energie', theme:'Gesamtbefinden', color:'#c8a96e', text:'Wie ist mein Energielevel gerade – ehrlich?', type:'scale', labels:['Leer','Voll']},
];

let curQ=0, answers={};
let entries=[], wins=[], streak=0, lastCheckin='';

function loadData(){
  try{entries=JSON.parse(localStorage.getItem('k_entries')||'[]');}catch(e){entries=[];}
  try{wins=JSON.parse(localStorage.getItem('k_wins')||'[]');}catch(e){wins=[];}
  streak=parseInt(localStorage.getItem('k_streak')||'0');
  lastCheckin=localStorage.getItem('k_last')||'';
}

function saveData(){
  localStorage.setItem('k_entries',JSON.stringify(entries));
  localStorage.setItem('k_wins',JSON.stringify(wins));
  localStorage.setItem('k_streak',streak+'');
  localStorage.setItem('k_last',lastCheckin);
}

function setNav(id){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(id) document.getElementById(id).classList.add('active');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function showHome(){
  showScreen('screen-home');
  setNav('nav-home');
  initHome();
}

function initHome(){
  const h=new Date().getHours();
  const g=h<12?'Guten Morgen':h<18?'Guten Tag':'Guten Abend';
  document.getElementById('el-greeting').textContent=g+', Thomas.';
  document.getElementById('el-date').textContent=new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});
  const today=new Date().toDateString();
  const done=lastCheckin===today;
  const banner=document.getElementById('el-banner');
  const btn=document.getElementById('el-startbtn');
  if(done){banner.classList.add('show');btn.textContent='✓ Heute erledigt';btn.classList.add('done-state');}
  else{banner.classList.remove('show');btn.textContent='Täglicher Check-in starten →';btn.classList.remove('done-state');}
  document.getElementById('el-streak').textContent=streak;
  const dots=document.getElementById('el-dots');
  dots.innerHTML='';
  const litDots=streak>=7?7:streak%7===0&&streak>0?7:streak%7;
  for(let i=0;i<7;i++){const d=document.createElement('div');d.className='dot'+(i<litDots?' on':'');dots.appendChild(d);}
  renderWins();
}

function renderWins(){
  const today=new Date().toDateString();
  document.getElementById('el-winlist').innerHTML=wins.filter(w=>w.date===today).map(w=>`<div class="win-item"><span class="win-dot">◆</span><span>${w.text}</span></div>`).join('');
}

function addWin(){
  const inp=document.getElementById('el-wininput');
  const t=inp.value.trim();
  if(!t)return;
  wins.push({text:t,date:new Date().toDateString()});
  saveData();renderWins();inp.value='';
}

document.getElementById('el-wininput').addEventListener('keypress',e=>{if(e.key==='Enter')addWin();});

function startCheckin(){
  const today=new Date().toDateString();
  if(lastCheckin===today){
    showScreen('screen-home');
    setNav('nav-home');
    initHome();
    return;
  }
  curQ=0;answers={};
  showScreen('screen-checkin');
  setNav('nav-checkin');
  renderQ();
}

function renderQ(){
  const q=QS[curQ];
  document.getElementById('el-progress').innerHTML=QS.map((_,i)=>`<div class="prog-step ${i<curQ?'done':i===curQ?'current':''}"></div>`).join('');
  document.getElementById('el-qtheme').textContent=q.theme;
  document.getElementById('el-qtheme').style.color=q.color;
  document.getElementById('el-qcount').textContent=`Frage ${curQ+1} von ${QS.length}`;
  document.getElementById('el-back').style.display=curQ===0?'none':'block';
  document.getElementById('el-next').textContent=curQ===QS.length-1?'Abschließen ✓':'Weiter';
  const saved=answers[q.id];
  let html='';
  if(q.type==='scale'){
    html=`<div class="q-card"><div class="q-text">${q.text}</div><div class="scale-row">${[1,2,3,4,5].map(n=>`<button class="scale-btn${saved==n?' sel':''}" onclick="selScale(${n})">${n}</button>`).join('')}</div><div class="scale-labels"><span>${q.labels[0]}</span><span>${q.labels[1]}</span></div></div>`;
  } else if(q.type==='text'){
    html=`<div class="q-card"><div class="q-text">${q.text}</div><textarea class="q-textarea" id="el-ta" placeholder="${q.placeholder||''}">${saved||''}</textarea>${q.optional?'<div class="optional-hint">Optional – du kannst auch überspringen</div>':''}</div>`;

} else if(q.type===‘yesno’){
html=`<div class="q-card"><div class="q-text">${q.text}</div><div class="yesno-row"><button class="yesno-btn${saved==='ja'?' sel-yes':''}" onclick="selYN('ja')">✓ Ja</button><button class="yesno-btn${saved==='nein'?' sel-no':''}" onclick="selYN('nein')">✗ Nein</button></div></div>`;
}
document.getElementById(‘el-qarea’).innerHTML=html;
}

function selScale(n){
answers[QS[curQ].id]=n;
document.querySelectorAll(’.scale-btn’).forEach((b,i)=>b.classList.toggle(‘sel’,i+1===n));
}

function selYN(v){
answers[QS[curQ].id]=v;
document.querySelectorAll(’.yesno-btn’).forEach(b=>{
b.className=‘yesno-btn’;
if(v===‘ja’&&b.textContent.includes(‘Ja’))b.classList.add(‘sel-yes’);
if(v===‘nein’&&b.textContent.includes(‘Nein’))b.classList.add(‘sel-no’);
});
}

function nextQ(){
const q=QS[curQ];
if(q.type===‘text’){const ta=document.getElementById(‘el-ta’);if(ta)answers[q.id]=ta.value.trim();}
if(q.type===‘scale’&&!answers[q.id])return;
if(curQ<QS.length-1){curQ++;renderQ();}
else finishCheckin();
}

function prevQ(){if(curQ>0){curQ–;renderQ();}}

function finishCheckin(){
const today=new Date().toDateString();
entries.unshift({date:today,ts:Date.now(),answers:{…answers}});
const yd=new Date();yd.setDate(yd.getDate()-1);
streak=lastCheckin===yd.toDateString()?streak+1:1;
lastCheckin=today;
saveData();
showDone(entries[0]);
}

function showDone(entry){
showScreen(‘screen-done’);setNav(’’);
const keys=[‘sichtbarkeit’,‘selbstwert’,‘struktur’,‘energie’];
const lbls=[‘Sichtbarkeit’,‘Selbstwert’,‘Struktur’,‘Energie’];
document.getElementById(‘el-scoregrid’).innerHTML=keys.map((k,i)=>{
const v=entry.answers[k];
const cls=v>=4?‘good’:v>=3?‘mid’:‘low’;
return `<div class="score-card"><div class="score-lbl">${lbls[i]}</div><div class="score-val ${v?cls:''}">${v?v+'/5':'–'}</div></div>`;
}).join(’’);
const e=entry.answers[‘energie’]||3,s=entry.answers[‘selbstwert’]||3;
let msg=‘Du hast dir heute Zeit für dich genommen. Das ist keine Kleinigkeit.’;
if(e<=2)msg=‘Energie ist gerade knapp – das ist okay. Morgen ist ein neuer Tag.’;
if(s<=2)msg=‘Dein innerer Kritiker war heute hart. Erinnere dich: du würdest einem Freund mehr Gnade geben.’;
if(e>=4&&s>=4)msg=‘Starker Tag. Merkst du, was möglich ist, wenn du dich selbst nicht im Weg stehst?’;
document.getElementById(‘el-donemsg’).textContent=msg;
}

function goHome(){showHome();}

function showHistory(){
showScreen(‘screen-history’);setNav(‘nav-history’);
const keys=[{id:‘sichtbarkeit’,lbl:‘Sichtbarkeit’,col:’#c8a96e’},{id:‘selbstwert’,lbl:‘Selbstwert’,col:’#a07ec8’},{id:‘struktur’,lbl:‘Struktur’,col:’#7eb8a4’},{id:‘energie’,lbl:‘Energie’,col:’#c87e7e’}];
const trends=document.getElementById(‘el-trends’);
if(!entries.length){trends.innerHTML=’<div style="font-size:13px;color:#7a7570">Noch keine Daten.</div>’;}
else{trends.innerHTML=keys.map(k=>{const vals=entries.map(e=>e.answers[k.id]).filter(v=>v);if(!vals.length)return ‘’;const avg=vals.reduce((a,b)=>a+b,0)/vals.length;return `<div class="trend-item"><div class="trend-lbl">${k.lbl}</div><div class="trend-track"><div class="trend-fill" style="width:${(avg/5*100).toFixed(0)}%;background:${k.col}"></div></div><div class="trend-val">${avg.toFixed(1)}</div></div>`;}).join(’’);}
const list=document.getElementById(‘el-histlist’);
if(!entries.length){list.innerHTML=’<div class="empty-msg">Noch keine Check-ins.<br>Starte deinen ersten heute.</div>’;return;}
list.innerHTML=entries.map((e,i)=>{
const d=new Date(e.ts).toLocaleDateString(‘de-DE’,{weekday:‘long’,day:‘numeric’,month:‘long’});
const pills=[‘sichtbarkeit’,‘selbstwert’,‘struktur’,‘energie’].map((k,j)=>{const v=e.answers[k];if(!v)return ‘’;const c=v>=4?‘hi’:v>=3?‘mid’:‘lo’;return `<span class="pill ${c}">${['Sicht.','Selbstwert','Struktur','Energie'][j]}: ${v}</span>`;}).join(’’);
return `<div class="history-entry" onclick="openEntry(${i})"><div class="h-date">${d}</div><div class="h-pills">${pills}</div></div>`;
}).join(’’);
}

function openEntry(i){
const e=entries[i];
const d=new Date(e.ts).toLocaleDateString(‘de-DE’,{weekday:‘long’,day:‘numeric’,month:‘long’,year:‘numeric’});
const qmap={};QS.forEach(q=>qmap[q.id]=q);
document.getElementById(‘el-modalcontent’).innerHTML=`<div class="modal-date">${d}</div>`+Object.entries(e.answers).map(([k,v])=>{const q=qmap[k];if(!q||!v)return ‘’;const disp=typeof v===‘number’?v+’ / 5’:v;return `<div class="modal-row"><div class="modal-qlbl">${q.theme}</div><div class="modal-qtxt">${q.text}</div><div class="modal-val">${disp}</div></div>`;}).join(’’);
document.getElementById(‘el-modal’).classList.add(‘open’);
}

function closeModal(){document.getElementById(‘el-modal’).classList.remove(‘open’);}

loadData();
showHome();
</script>
