<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kompass</title>
<style>
html,body{margin:0;padding:0;background:#1c1813;color:#e8e0d4;font-family:sans-serif;min-height:100%;}
#app{padding:40px 20px 100px;}
.gold{color:#c8a96e;}
.card{background:#252018;border:1px solid #38332c;border-radius:14px;padding:18px;margin-bottom:16px;}
.btn{display:block;width:100%;background:#c8a96e;color:#1c1813;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:bold;margin-bottom:14px;}
.page{display:none;}
.page.on{display:block;}
#nav{position:fixed;bottom:0;left:0;right:0;background:#252018;border-top:1px solid #38332c;display:flex;padding:10px 0 20px;}
#nav button{flex:1;background:none;border:none;color:#7a7570;font-size:11px;padding:4px;}
#nav button.on{color:#c8a96e;}
</style>
</head>
<body>
<div id="app">
  <div class="page on" id="p-home">
    <div class="gold" style="font-size:11px;letter-spacing:3px">◈ KOMPASS</div>
    <h1 id="greeting" style="font-size:28px;font-weight:400;margin:8px 0 20px">Guten Abend, Thomas.</h1>
    <div class="card">
      <span style="font-size:24px">🔥</span>
      <span id="streak" style="font-size:22px;color:#c8a96e;margin-left:10px">0</span>
      <span style="font-size:12px;color:#7a7570"> Tage in Folge</span>
    </div>
    <button class="btn" id="btn-start">Täglicher Check-in starten →</button>
    <div style="font-size:10px;letter-spacing:3px;color:#7a7570;margin:20px 0 10px">MEINE ERFOLGE HEUTE</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input id="win-in" type="text" placeholder="Was habe ich heute gut gemacht?" style="flex:1;background:#252018;border:1px solid #38332c;border-radius:10px;padding:12px;color:#e8e0d4;font-size:14px;">
      <button id="win-btn" style="background:#2e2b24;border:1px solid #38332c;border-radius:10px;padding:12px 16px;color:#c8a96e;font-size:20px;">+</button>
    </div>
    <div id="win-list"></div>
  </div>

  <div class="page" id="p-checkin">
    <div id="q-theme" style="font-size:10px;letter-spacing:3px;margin-bottom:6px"></div>
    <div id="q-num" style="font-size:12px;color:#7a7570;margin-bottom:20px"></div>
    <div class="card">
      <div id="q-text" style="font-size:18px;margin-bottom:20px"></div>
      <div id="q-in"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:12px">
      <button id="btn-back" style="background:#252018;border:1px solid #38332c;border-radius:10px;padding:14px 18px;color:#7a7570;font-size:14px;">←</button>
      <button id="btn-next" style="flex:1;background:#c8a96e;color:#1c1813;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:bold;">Weiter</button>
    </div>
  </div>

  <div class="page" id="p-done">
    <div style="text-align:center;padding:40px 0">
      <div style="font-size:56px">🧭</div>
      <h2 style="font-weight:400;margin:16px 0 10px">Gut gemacht, Thomas.</h2>
      <div id="done-msg" style="color:#7a7570;font-size:14px;line-height:1.7;margin-bottom:28px"></div>
    </div>
    <div id="score-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px"></div>
    <button class="btn" id="btn-home2">Zurück zum Start</button>
  </div>

  <div class="page" id="p-hist">
    <h2 style="font-weight:400;margin-bottom:20px">Verlauf</h2>
    <div id="hist-list"></div>
  </div>
</div>

<div id="nav">
  <button id="n-home" class="on">⌂<br>Start</button>
  <button id="n-ci">◎<br>Check-in</button>
  <button id="n-hist">◫<br>Verlauf</button>
</div>

<script>
var QS=[
  {id:'sichtbarkeit',theme:'Sichtbarkeit',color:'#c8a96e',text:'Habe ich heute meine Meinung klar geäußert?',type:'scale',l0:'Gar nicht',l1:'Stark'},
  {id:'selbstwert',theme:'Selbstwert',color:'#a07ec8',text:'Wie fair war mein innerer Kritiker heute?',type:'scale',l0:'Sehr hart',l1:'Fair'},
  {id:'struktur',theme:'Struktur',color:'#7eb8a4',text:'Wie gut habe ich heute ohne externen Druck angetrieben?',type:'scale',l0:'Sofa-Tag',l1:'Eigenständig'},
  {id:'notiz',theme:'Rückschläge',color:'#c87e7e',text:'Ist mir heute etwas schiefgelaufen? Was habe ich daraus gemacht?',type:'text',ph:'Optional...'},
  {id:'energie',theme:'Energie',color:'#c8a96e',text:'Wie ist mein Energielevel gerade?',type:'scale',l0:'Leer',l1:'Voll'}
];
var entries=[],wins=[],streak=0,lastCI='',curQ=0,ans={};
try{entries=JSON.parse(localStorage.getItem('ke')||'[]');}catch(e){}
try{wins=JSON.parse(localStorage.getItem('kw')||'[]');}catch(e){}
streak=parseInt(localStorage.getItem('ks')||'0')||0;
lastCI=localStorage.getItem('kl')||'';

function sv(){localStorage.setItem('ke',JSON.stringify(entries));localStorage.setItem('kw',JSON.stringify(wins));localStorage.setItem('ks',''+streak);localStorage.setItem('kl',lastCI);}

function pg(id){document.querySelectorAll('.page').forEach(function(p){p.className='page';});document.getElementById(id).className='page on';window.scrollTo(0,0);}
function nav(id){document.querySelectorAll('#nav button').forEach(function(b){b.className='';});if(id)document.getElementById(id).className='on';}

function home(){
  pg('p-home');nav('n-home');
  var h=new Date().getHours();
  document.getElementById('greeting').textContent=(h<12?'Guten Morgen':h<18?'Guten Tag':'Guten Abend')+', Thomas.';
  document.getElementById('streak').textContent=streak;
  var today=new Date().toDateString();
  var b=document.getElementById('btn-start');
  if(lastCI===today){b.textContent='✓ Heute erledigt';b.style.background='#2e2b24';b.style.color='#7a7570';}
  else{b.textContent='Täglicher Check-in starten →';b.style.background='#c8a96e';b.style.color='#1c1813';}
  var wl=document.getElementById('win-list');
  wl.innerHTML='';
  wins.forEach(function(w){if(w.date===today){var d=document.createElement('div');d.style.cssText='padding:8px 0;border-bottom:1px solid #38332c;font-size:14px;color:#b0a898;';d.textContent='◆ '+w.text;wl.appendChild(d);}});
}

function addWin(){var i=document.getElementById('win-in');var t=i.value.trim();if(!t)return;wins.push({text:t,date:new Date().toDateString()});sv();home();i.value='';}

function ci(){
  var today=new Date().toDateString();
  if(lastCI===today){home();return;}
  curQ=0;ans={};pg('p-checkin');nav('n-ci');rq();
}

function rq(){
  var q=QS[curQ];
  document.getElementById('q-theme').textContent=q.theme;
  document.getElementById('q-theme').style.color=q.color;
  document.getElementById('q-num').textContent='Frage '+(curQ+1)+' von '+QS.length;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('btn-back').style.display=curQ===0?'none':'block';
  document.getElementById('btn-next').textContent=curQ===QS.length-1?'Fertig ✓':'Weiter';
  var sv2=ans[q.id];
  var html='';
  if(q.type==='scale'){
    html='<div style="display:flex;gap:7px;margin-bottom:8px">';
    for(var n=1;n<=5;n++)html+='<button onclick="ps('+n+')" id="s'+n+'" style="flex:1;height:50px;background:'+(sv2==n?'#c8a96e':'#2e2b24')+';border:1px solid #38332c;border-radius:10px;color:'+(sv2==n?'#1c1813':'#7a7570')+';font-size:14px;font-weight:bold;">'+n+'</button>';
    html+='</div><div style="display:flex;justify-content:space-between;font-size:11px;color:#7a7570"><span>'+q.l0+'</span><span>'+q.l1+'</span></div>';
  } else {
    html='<textarea id="ta" placeholder="'+(q.ph||'')+'" style="width:100%;background:#2e2b24;border:1px solid #38332c;border-radius:10px;padding:12px;color:#e8e0d4;font-size:14px;min-height:80px;resize:none;">'+(sv2||'')+'</textarea><div style="font-size:11px;color:#7a7570;margin-top:6px">Optional</div>';

}
document.getElementById(‘q-in’).innerHTML=html;
}

function ps(n){
ans[QS[curQ].id]=n;
for(var i=1;i<=5;i++){var b=document.getElementById(‘s’+i);if(b){b.style.background=i===n?’#c8a96e’:’#2e2b24’;b.style.color=i===n?’#1c1813’:’#7a7570’;}}
}

function nq(){
var q=QS[curQ];
if(q.type===‘text’){var ta=document.getElementById(‘ta’);if(ta)ans[q.id]=ta.value.trim();}
if(q.type===‘scale’&&!ans[q.id])return;
if(curQ<QS.length-1){curQ++;rq();}
else{fin();}
}

function pq(){if(curQ>0){curQ–;rq();}}

function fin(){
var today=new Date().toDateString();
var e={date:today,ts:Date.now(),a:JSON.parse(JSON.stringify(ans))};
entries.unshift(e);
var yd=new Date();yd.setDate(yd.getDate()-1);
streak=lastCI===yd.toDateString()?streak+1:1;
lastCI=today;sv();
pg(‘p-done’);nav(’’);
var keys=[‘sichtbarkeit’,‘selbstwert’,‘struktur’,‘energie’];
var lbls=[‘Sichtbarkeit’,‘Selbstwert’,‘Struktur’,‘Energie’];
var g=’’;
for(var i=0;i<keys.length;i++){var v=e.a[keys[i]];var c=v>=4?’#7eb8a4’:v>=3?’#c8a96e’:’#c87e7e’;g+=’<div style="background:#252018;border:1px solid #38332c;border-radius:12px;padding:14px"><div style="font-size:10px;letter-spacing:2px;color:#7a7570;margin-bottom:5px">’+lbls[i].toUpperCase()+’</div><div style="font-size:20px;color:'+(v?c:'#e8e0d4')+'">’+(v?v+’/5’:’–’)+’</div></div>’;}
document.getElementById(‘score-grid’).innerHTML=g;
var ev=e.a[‘energie’]||3,sv3=e.a[‘selbstwert’]||3;
var msg=‘Du hast dir heute Zeit für dich genommen. Das ist keine Kleinigkeit.’;
if(ev<=2)msg=‘Energie ist knapp – das ist okay. Morgen ist ein neuer Tag.’;
if(sv3<=2)msg=‘Dein innerer Kritiker war heute hart. Du würdest einem Freund mehr Gnade geben.’;
if(ev>=4&&sv3>=4)msg=‘Starker Tag. Merkst du, was möglich ist, wenn du dir selbst nicht im Weg stehst?’;
document.getElementById(‘done-msg’).textContent=msg;
}

function hist(){
pg(‘p-hist’);nav(‘n-hist’);
var l=document.getElementById(‘hist-list’);
if(!entries.length){l.innerHTML=’<div style="text-align:center;color:#7a7570;padding:40px 0">Noch keine Einträge.</div>’;return;}
var h=’’;
for(var i=0;i<entries.length;i++){
var d=new Date(entries[i].ts).toLocaleDateString(‘de-DE’,{weekday:‘long’,day:‘numeric’,month:‘long’});
h+=’<div style="background:#252018;border:1px solid #38332c;border-radius:14px;padding:16px;margin-bottom:10px"><div style="font-size:12px;color:#7a7570;margin-bottom:8px">’+d+’</div>’;
var keys=[‘sichtbarkeit’,‘selbstwert’,‘struktur’,‘energie’];
var lbls=[‘Sicht.’,‘Selbstwert’,‘Struktur’,‘Energie’];
for(var j=0;j<keys.length;j++){var v=entries[i].a[keys[j]];if(v){var c=v>=4?’#192820’:v>=3?’#2a2618’:’#281818’;var tc=v>=4?’#7eb8a4’:v>=3?’#c8a96e’:’#c87e7e’;h+=’<span style="font-size:11px;padding:3px 10px;border-radius:20px;background:'+c+';color:'+tc+';margin-right:5px">’+lbls[j]+’: ‘+v+’</span>’;}}
h+=’</div>’;
}
l.innerHTML=h;
}

window.onload=function(){
document.getElementById(‘n-home’).onclick=function(){home();};
document.getElementById(‘n-ci’).onclick=function(){ci();};
document.getElementById(‘n-hist’).onclick=function(){hist();};
document.getElementById(‘btn-start’).onclick=function(){ci();};
document.getElementById(‘btn-back’).onclick=function(){pq();};
document.getElementById(‘btn-next’).onclick=function(){nq();};
document.getElementById(‘btn-home2’).onclick=function(){home();};
document.getElementById(‘win-btn’).onclick=function(){addWin();};
document.getElementById(‘win-in’).onkeypress=function(e){if(e.key===‘Enter’)addWin();};
home();
};
</script>

</body>
</html>
