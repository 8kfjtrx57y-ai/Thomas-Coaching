<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Thomas Coaching</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #050608;
  --bg2:       #0d0f14;
  --card:      rgba(28,30,35,0.75);
  --border:    rgba(255,255,255,0.08);
  --border2:   rgba(255,255,255,0.13);
  --accent:    #007AFF;
  --accent-g:  rgba(0,122,255,0.35);
  --gold:      #d4a843;
  --gruen:     #30d158;
  --rot:       #ff453a;
  --orange:    #ff9f0a;
  --t:         #ffffff;
  --t2:        rgba(255,255,255,0.5);
  --t3:        rgba(255,255,255,0.22);
  --r:         22px;
  --pad:       20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg);
  background-image: radial-gradient(circle at 50% -10%, #1a2a4a 0%, #050608 55%);
  color: var(--t);
  font-family: 'Inter', sans-serif;
}

.app {
  width: 100%; max-width: 430px; 
  height: 100vh; height: 100dvh;
  margin: 0 auto; display: flex; flex-direction: column; position: relative; overflow: hidden;
}

/* HEADER */
.header { padding: 60px var(--pad) 14px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
.hdr-t { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
.hdr-t span { color: var(--accent); }
.serie-badge { background: rgba(212,168,67,.12); border: 1px solid rgba(212,168,67,.25); padding: 6px 14px; border-radius: 100px; font-size: 13px; font-weight: 600; color: var(--gold); }

/* CONTENT */
.inhalt { flex: 1; overflow-y: auto; padding: 8px var(--pad) 130px; scrollbar-width: none; }
.inhalt::-webkit-scrollbar { display: none; }
.seite { display: none; animation: fade .3s ease-out; }
.seite.aktiv { display: block; }
@keyframes fade { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* CARDS */
.karte { background: var(--card); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; margin-bottom: 14px; }
.gk { font-size: 11px; font-weight: 700; color: var(--t2); text-transform: uppercase; letter-spacing: 1.2px; margin: 22px 0 10px 4px; }

/* GEWICHT HERO */
.gew-hero { text-align: center; padding: 28px 20px; background: linear-gradient(180deg, rgba(0,122,255,.07) 0%, transparent 100%); border-radius: var(--r); margin-bottom: 14px; border: 1px solid rgba(0,122,255,.12); }
.gew-row { display: flex; align-items: baseline; justify-content: center; gap: 6px; }
.gew-inp { background: transparent; border: none; color: var(--t); font-size: 58px; font-weight: 800; width: 180px; text-align: center; outline: none; }

/* INPUT GRID */
.inp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.inp-box { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 16px; }
.ib-lbl { font-size: 11px; font-weight: 600; color: var(--t2); margin-bottom: 8px; }
.ib-inp { background: transparent; border: none; color: var(--t); font-size: 22px; font-weight: 700; width: 100%; outline: none; }

/* DOCK NAV */
.dock-wrap { position: absolute; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; padding: 0 var(--pad); z-index: 100; }
.dock { background: rgba(28,30,38,.85); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,.12); border-radius: 35px; padding: 8px; display: flex; gap: 6px; }
.nt { width: 54px; height: 54px; border-radius: 27px; border: none; background: transparent; color: var(--t2); display: flex; align-items: center; justify-content: center; flex-direction: column; transition: 0.3s; }
.nt.aktiv { background: var(--accent); color: #fff; transform: translateY(-2px); }
.nt-txt { font-size: 8px; font-weight: 700; margin-top: 2px; }

/* BUTTONS */
.btn-p { background: var(--accent); color: #fff; border: none; border-radius: 18px; padding: 18px; width: 100%; font-weight: 700; font-size: 16px; margin: 15px 0; box-shadow: 0 10px 20px var(--accent-g); }
.sbox { display: flex; gap: 12px; border-radius: var(--r); padding: 16px; margin-bottom: 14px; border: 1px solid var(--border); background: var(--card); }
.sbox.held { border-color: var(--gruen); background: rgba(48,209,88,0.05); }

/* Verbleibende Styles wie in deinem Entwurf... */
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="hdr-t">Thomas <span>Coaching</span></div>
    <div class="serie-badge" id="serie">🔥 <span id="serie-txt">0 Tage</span></div>
  </header>

  <div class="inhalt">
    <div class="seite aktiv" id="seite-heute">
      <div class="sbox" id="sbox">
        <span class="sico">☀️</span>
        <span class="stxt" id="stxt">Guten Tag, Thomas!</span>
      </div>

      <div class="gew-hero">
        <div class="gk" style="margin:0; text-align:center">Gewicht heute</div>
        <div class="gew-row">
          <input class="gew-inp" type="number" id="inp-gew" placeholder="0.0" step="0.1" inputmode="decimal">
          <span style="color:var(--t2)">kg</span>
        </div>
      </div>

      <div class="inp-grid">
        <div class="inp-box"><div class="ib-lbl">👟 Schritte</div><input class="ib-inp" id="inp-sch" type="number" placeholder="0"></div>
        <div class="inp-box"><div class="ib-lbl">🔥 Kalorien</div><input class="ib-inp" id="inp-kal" type="number" placeholder="0"></div>
        <div class="inp-box"><div class="ib-lbl">💪 Eiweiß (g)</div><input class="ib-inp" id="inp-eiw" type="number" placeholder="0"></div>
        <div class="inp-box"><div class="ib-lbl">😴 Schlaf (h)</div><input class="ib-inp" id="inp-slaf" type="number" placeholder="0"></div>
      </div>

      <button class="btn-p" onclick="heuteSpeichern()">Eintrag speichern</button>
      
      </div>
    
    </div>

  <div class="dock-wrap">
    <nav class="dock">
      <button class="nt aktiv" onclick="seite('heute',this)"><span>✏️</span><span class="nt-txt">Heute</span></button>
      <button class="nt" onclick="seite('uebersicht',this)"><span>📊</span><span class="nt-txt">Stats</span></button>
      <button class="nt" onclick="seite('coach',this)"><span>🤖</span><span class="nt-txt">Coach</span></button>
      <button class="nt" onclick="seite('verlauf',this)"><span>📁</span><span class="nt-txt">Daten</span></button>
    </nav>
  </div>
</div>

<script>
// Kopiere hier deine JavaScript-Logik aus deiner Nachricht hinein. 
// Achte darauf, dass die IDs der Inputs (inp-gew, inp-sch etc.) übereinstimmen.
</script>
</body>
</html>
